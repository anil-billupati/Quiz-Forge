neutron-version: 1.0
project-name: ContestForge
project-type: full-stack
service-pattern: hybrid
cloud: aws
language: python
framework: fastapi
frontend:
  language: typescript
  framework: nextjs
region: tbd
environments: tbd
data-stores:
  primary: postgresql
  postgresql:
    provider: aws-rds
    deployment: multi-az
    proxy: pgbouncer-if-needed
    read_replica: true
    backup_retention_days: 35
  cache:
    provider: aws-elasticache-redis
    mode: cluster
    uses:
      - leaderboard-zsets
      - pub-sub
      - ws-presence
      - dedupe-keys
      - rate-limits
      - command-stream
integrations:
  queue: redis-streams
  edge: aws-waf-alb
  secrets: aws-secrets-manager
  observability: opentelemetry-aws-cloudwatch
compliance: soc2-gdpr-readiness
